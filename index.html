<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Webuy OPS Center — Login</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#1a2a4a 0%,#2d4a7a 50%,#1a3a5c 100%);
    position:relative;
    overflow:hidden;
  }
  body::before{
    content:'';position:absolute;inset:0;
    background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  /* Floating planes animation */
  .bg-plane{position:absolute;font-size:28px;opacity:.06;animation:float linear infinite;}
  @keyframes float{from{transform:translateX(-60px) translateY(0) rotate(-20deg);}to{transform:translateX(110vw) translateY(-30px) rotate(-20deg);}}

  .login-wrap{
    position:relative;z-index:10;
    width:100%;max-width:420px;
    padding:0 20px;
  }

  /* Logo area */
  .logo-area{text-align:center;margin-bottom:32px;}
  .logo-icon{
    width:72px;height:72px;border-radius:20px;
    background:linear-gradient(135deg,#4A90D9,#2d6abf);
    display:inline-flex;align-items:center;justify-content:center;
    font-size:36px;margin-bottom:14px;
    box-shadow:0 8px 32px rgba(74,144,217,.4);
  }
  .logo-title{color:#fff;font-size:24px;font-weight:700;letter-spacing:-.5px;}
  .logo-sub{color:rgba(255,255,255,.5);font-size:13px;margin-top:4px;}

  /* Card */
  .card{
    background:rgba(255,255,255,.97);
    border-radius:20px;
    padding:36px 32px;
    box-shadow:0 24px 80px rgba(0,0,0,.3);
  }
  .card h2{font-size:18px;font-weight:700;color:#1a2a4a;margin-bottom:6px;}
  .card p{font-size:13px;color:#666;margin-bottom:28px;}

  .form-group{margin-bottom:18px;}
  label{display:block;font-size:12px;font-weight:600;color:#444;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
  input{
    width:100%;padding:12px 14px;
    border:1.5px solid #E0E7F0;border-radius:10px;
    font-size:14px;color:#1a2a4a;
    transition:border-color .2s,box-shadow .2s;
    outline:none;background:#F8FAFD;
  }
  input:focus{border-color:#4A90D9;box-shadow:0 0 0 3px rgba(74,144,217,.15);background:#fff;}
  input::placeholder{color:#aaa;}

  .btn-login{
    width:100%;padding:14px;
    background:linear-gradient(135deg,#4A90D9,#2d6abf);
    color:#fff;border:none;border-radius:10px;
    font-size:15px;font-weight:600;cursor:pointer;
    transition:all .2s;margin-top:8px;
    box-shadow:0 4px 16px rgba(74,144,217,.35);
  }
  .btn-login:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(74,144,217,.45);}
  .btn-login:active{transform:translateY(0);}
  .btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none;}

  .error-msg{
    background:#FFF0F0;border:1px solid #FFCCCC;border-radius:8px;
    padding:10px 14px;font-size:13px;color:#CC3333;
    margin-bottom:16px;display:none;text-align:center;
  }

  /* Role badges */
  .roles{margin-top:24px;padding-top:20px;border-top:1px solid #EEF2F7;}
  .roles-title{font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
  .role-chips{display:flex;flex-wrap:wrap;gap:6px;}
  .role-chip{
    padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;
  }
  .chip-admin    {background:#EDE7F6;color:#4A148C;}
  .chip-ops      {background:#E3F2FD;color:#0D47A1;}
  .chip-visa     {background:#E8F5E9;color:#1B5E20;}
  .chip-ticketing{background:#FFF3E0;color:#E65100;}
  .chip-cs       {background:#FCE4EC;color:#880E4F;}
  .chip-sales    {background:#F3E5F5;color:#4A148C;}

  /* Spinner */
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* Footer */
  .footer{text-align:center;margin-top:24px;color:rgba(255,255,255,.35);font-size:11px;}
</style>
</head>
<body>

<!-- Background floating planes -->
<div class="bg-plane" style="top:15%;animation-duration:18s;animation-delay:0s;font-size:22px">✈️</div>
<div class="bg-plane" style="top:45%;animation-duration:24s;animation-delay:5s;font-size:16px">🛫</div>
<div class="bg-plane" style="top:70%;animation-duration:20s;animation-delay:10s;font-size:20px">✈️</div>
<div class="bg-plane" style="top:30%;animation-duration:30s;animation-delay:3s;font-size:14px">🌏</div>

<div class="login-wrap">
  <div class="logo-area">
    <div class="logo-icon">✈️</div>
    <div class="logo-title">Travel with Webuy</div>
    <div class="logo-sub">Operations Management Center</div>
  </div>

  <div class="card">
    <h2>Welcome back 👋</h2>
    <p>Sign in with your department account to access the OPS system.</p>

    <div class="error-msg" id="error-msg">❌ Invalid username or password. Please try again.</div>

    <form id="login-form" onsubmit="doLogin(event)">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter your username" autocomplete="username" autofocus required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login" id="login-btn">Sign In →</button>
    </form>

    <div class="roles">
      <div class="roles-title">Department Access</div>
      <div class="role-chips">
        <span class="role-chip chip-admin">👑 Admin</span>
        <span class="role-chip chip-ops">📋 OPS</span>
        <span class="role-chip chip-visa">🛂 Visa</span>
        <span class="role-chip chip-ticketing">🎫 Ticketing</span>
        <span class="role-chip chip-cs">💬 CS</span>
        <span class="role-chip chip-sales">💼 Sales</span>
      </div>
    </div>
  </div>

  <div class="footer">© 2024 Travel with Webuy · Internal Use Only</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// Fallback CDN if jsdelivr is blocked in some regions.
if (typeof window.supabase === 'undefined') {
  document.write('<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js"><\/script>');
}
</script>
<script>
// ─── Supabase client (publishable key is safe to ship in the browser) ──────
const SUPABASE_URL = 'https://vnjdlxgwdgofghqjvxqp.supabase.co';
const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_n7eDoUrf9cRAzX4eKjl9Tg_CHLD-mbk';
const EMAIL_DOMAIN = 'webuy.local';

if (!window.supabase || !window.supabase.createClient) {
  // Body isn't parsed yet at this point — surface via window.alert after DOMContentLoaded.
  window.addEventListener('DOMContentLoaded', () => {
    const el = document.getElementById('error-msg');
    if (el) { el.textContent = '⚠️ Supabase SDK failed to load. Check network / browser extensions blocking jsdelivr & unpkg.'; el.style.display = 'block'; }
  });
  console.error('[Supabase] SDK not loaded — login disabled.');
}

const sb = (window.supabase && window.supabase.createClient)
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
      auth: { persistSession: true, storage: localStorage, storageKey: 'webuy_sb_session' },
    })
  : null;

// ─── Session helpers ───────────────────────────────────────────────────────
// Guard every auth call against a wedged Web Locks state. supabase-js serializes
// auth ops with navigator.locks; a crashed prior tab — or a stale session that
// keeps failing to refresh — can leave them stuck, which would otherwise freeze
// this page forever.
function _withTimeout(promise, ms, label) {
  let t;
  const timeout = new Promise((_, reject) => {
    t = setTimeout(() => reject(new Error(label || 'timeout')), ms);
  });
  return Promise.race([promise, timeout]).finally(() => clearTimeout(t));
}

// Returns a genuinely usable session, or null. If the stored session can't be
// refreshed (e.g. its refresh token was revoked by an admin password reset) it
// is cleared here, so the login page settles instead of ping-ponging with
// /app.html on a session that looks logged-in but is actually dead.
async function getUsableSession() {
  if (!sb) return null;
  try {
    const { data: { session } } = await _withTimeout(sb.auth.getSession(), 8000, 'getSession timeout');
    if (!session) return null;
    const expMs = session.expires_at ? session.expires_at * 1000 : 0;
    if (expMs && expMs - Date.now() > 60000) return session;   // comfortably valid
    // Expired / near-expiry → it must prove it can still refresh.
    const { data, error } = await _withTimeout(sb.auth.refreshSession(), 8000, 'refresh timeout');
    if (error || !data || !data.session) throw error || new Error('refresh failed');
    return data.session;
  } catch (_) {
    try { await _withTimeout(sb.auth.signOut({ scope: 'local' }), 4000, 'signout timeout'); } catch (_) {}
    try { localStorage.removeItem('webuy_sb_session'); } catch (_) {}
    return null;
  }
}

async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('error-msg');
  const username = document.getElementById('username').value.trim().toLowerCase();
  const password = document.getElementById('password').value;

  if (!sb) {
    err.textContent = '⚠️ Supabase SDK unavailable — page must reload from a working network.';
    err.style.display = 'block';
    return;
  }

  err.style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in...';

  // Accept bare username; suffix the email domain Supabase Auth uses internally.
  const email = username.includes('@') ? username : `${username}@${EMAIL_DOMAIN}`;

  try {
    const { data, error } = await _withTimeout(
      sb.auth.signInWithPassword({ email, password }),
      15000,
      'sign-in timeout'
    );

    if (error) {
      err.textContent = '❌ ' + (error.message || 'Invalid credentials. Please try again.');
      err.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = 'Sign In →';
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
      return;
    }

    btn.innerHTML = '✅ Success! Redirecting...';
    setTimeout(() => { window.location.href = '/app.html'; }, 400);

  } catch (e2) {
    // Includes the sign-in timeout above (e.g. a wedged auth lock). Clear any
    // half-written local auth state so a hard refresh starts clean.
    try { localStorage.removeItem('webuy_sb_session'); } catch (_) {}
    err.textContent = '⚠️ Sign-in didn’t complete (network or stuck session). Hard-refresh the page (Cmd/Ctrl+Shift+R) and try again.';
    err.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = 'Sign In →';
  }
}

// If already logged in (with a *usable* session), jump straight to app.
// A stale/revoked session — e.g. after an admin password reset — is cleared
// inside getUsableSession() so it can't bounce forever between / and /app.html.
(async () => {
  const session = await getUsableSession();
  if (session) window.location.href = '/app.html';
})();
</script>
</body>
</html>
