name: confirm-poll

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: confirm-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Call confirm-poll endpoint
        env:
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
          ENDPOINT: ${{ vars.CONFIRM_POLL_URL }}
        run: |
          URL="${ENDPOINT:-https://webuy-ops.vercel.app/api/confirm-poll}"
          echo "POST $URL"
          code=$(curl -sS -o /tmp/body.txt -w "%{http_code}" -X POST "$URL" \
            -H "x-sync-secret: ${SYNC_SECRET}")
          echo "HTTP $code"
          cat /tmp/body.txt
          echo
          test "$code" = "200"
