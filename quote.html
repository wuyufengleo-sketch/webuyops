<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WEBUY Tour & Travel - Itinerary</title>
<style>
  :root{--navy:#1B2F6B;--blue:#2E74B5;--muted:#667085;--line:#D9E2EF;--paper:#fff;--cream:#FFF7ED;--orange:#C05A00;--red:#C00000;--ink:#243044}
  *{box-sizing:border-box}
  body{margin:0;background:#EEF2F7;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;line-height:1.45}
  .shell{max-width:920px;margin:0 auto;background:var(--paper);min-height:100vh}
  .topbar{position:sticky;top:0;z-index:10;background:#fff;display:flex;align-items:center;gap:12px;padding:10px 18px;border-bottom:4px solid var(--navy)}
  .brand{font-weight:900;color:var(--navy);font-size:20px;margin-right:auto}.logo{height:34px;display:none}.actions{display:flex;gap:8px}.btn{border:0;border-radius:8px;color:#fff;text-decoration:none;font-size:13px;font-weight:800;padding:8px 13px;cursor:pointer}.btn.pdf{background:var(--navy)}.btn.doc{background:var(--blue)}
  .langs{display:flex;gap:0;border:1.5px solid var(--navy);border-radius:8px;overflow:hidden}.langs button{border:0;background:#fff;color:var(--navy);font-size:12px;font-weight:800;padding:7px 11px;cursor:pointer;border-right:1.5px solid var(--navy)}.langs button:last-child{border-right:0}.langs button.active{background:var(--navy);color:#fff}.langs button:disabled{opacity:.55;cursor:wait}
  .cover,.sheet{padding:24px 28px}.cover{min-height:calc(100vh - 58px);display:flex;flex-direction:column}.eyebrow{color:var(--orange);font-weight:900;font-size:12px;letter-spacing:.5px;text-transform:uppercase}.title h1{font-size:35px;line-height:1.14;margin:8px 0 10px;color:var(--navy)}.subtitle{font-size:18px;color:var(--blue);font-weight:850}
  .hero-photo{height:330px;margin:20px 0 16px;border-radius:10px;overflow:hidden;position:relative;background:#111827;display:flex;align-items:center;justify-content:center}.hero-photo::before{content:"";position:absolute;inset:-24px;background-image:var(--photo);background-size:cover;background-position:center;filter:blur(22px);transform:scale(1.08);opacity:.6}.hero-photo::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(17,24,39,.35),rgba(17,24,39,.03),rgba(17,24,39,.35))}.hero-photo img{position:relative;z-index:1;width:100%;height:100%;object-fit:contain;display:block}.photo-card img{width:100%;height:100%;object-fit:cover;display:block}.caption{position:absolute;left:12px;bottom:10px;background:rgba(20,36,92,.82);color:#fff;border-radius:6px;padding:5px 9px;font-size:12px;font-weight:850;z-index:2}
  .meta{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0 12px}.meta div{border:1px solid var(--line);border-radius:8px;padding:10px;background:#F7FBFF}.meta b{display:block;color:var(--navy);font-size:11px;text-transform:uppercase}.meta span{font-weight:800}
  .note{background:var(--cream);border-left:4px solid #F59E0B;border-radius:7px;padding:12px 14px;color:#7C2D12;font-size:13px}.photo-strip{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}.photo-card{height:150px;border-radius:9px;overflow:hidden;position:relative;background:#111827;display:flex;align-items:center;justify-content:center}.photo-card::before{content:"";position:absolute;inset:-16px;background-image:var(--photo);background-size:cover;background-position:center;filter:blur(14px);transform:scale(1.08);opacity:.55}.photo-card::after{content:"";position:absolute;inset:0;background:rgba(17,24,39,.12)}.photo-card img{position:relative;z-index:1;object-fit:contain}
  .cover-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:12px;margin-top:auto}.box{border:1px solid var(--line);border-radius:8px;background:#FBFDFF;padding:12px}.box h3{margin:0 0 7px;color:var(--navy);font-size:15px}.box ul{margin:0;padding-left:18px}.box li{font-size:13px;margin:3px 0}
  .highlights{background:#F0F6FF;border-left:4px solid var(--blue);border-radius:0 8px 8px 0;padding:11px 14px;margin:0 0 12px}.highlights .hl-title{font-weight:900;color:var(--navy);font-size:14px;margin-bottom:6px;letter-spacing:.2px}.highlights .hl-item{font-size:13px;color:#374151;margin:3px 0;line-height:1.5}
  .section-title{font-size:19px;color:var(--navy);border-bottom:2px solid var(--line);padding-bottom:6px;margin:0 0 12px}.day{break-inside:avoid;border:1px solid var(--line);border-radius:9px;overflow:hidden;margin:0 0 13px;background:#fff}.day-head{display:flex;justify-content:space-between;gap:12px;background:var(--navy);color:#fff;padding:9px 13px;font-weight:900;font-size:13px}.meal{white-space:nowrap;color:#DBEAFE}.day-body{padding:11px 13px}.day-body p{font-size:13px;margin:0 0 8px}.day-photo{height:260px;border-radius:8px;overflow:hidden;background:#111827;margin:0 0 12px;position:relative;display:flex;align-items:center;justify-content:center}.day-photo::before{content:"";position:absolute;inset:-18px;background-image:var(--photo);background-size:cover;background-position:center;filter:blur(18px);transform:scale(1.08);opacity:.55}.day-photo::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(17,24,39,.35),rgba(17,24,39,.04),rgba(17,24,39,.35))}.day-photo img{position:relative;z-index:1;width:100%;height:100%;object-fit:contain;display:block}.dest{color:var(--navy);font-weight:900;font-size:13px;margin:4px 0}.att{margin:0 0 8px 10px}.att .name{color:var(--navy);font-weight:900}.att .desc{font-size:12.8px;color:#475467}.hotel{color:var(--navy);font-weight:850;font-size:13px;margin-top:8px}.opt,.shop{font-size:12.8px;margin:5px 0 5px 10px}.opt b{color:var(--orange)}.shop b{color:#6B4A2A}
  .price-table{width:100%;border-collapse:collapse;margin:8px 0 14px}.price-table th{background:var(--blue);color:#fff;font-size:12px;padding:9px;border:1px solid #879BB5}.price-table td{font-size:15px;font-weight:900;color:var(--navy);background:#FFF8C5;text-align:center;padding:12px;border:1px solid #879BB5}.noted{color:var(--red);font-size:12.5px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.footer{text-align:center;color:var(--muted);font-size:11px;margin-top:18px}
  .empty{padding:24px;color:var(--muted)}
  @media print{@page{size:A4;margin:0}body{background:#fff}.shell{max-width:none}.topbar{position:fixed;top:0;left:0;right:0;height:16mm;padding:4mm 13mm 3mm;background:#fff;border-bottom:4px solid var(--navy)}.brand{font-size:18px}.actions{display:none}.cover,.sheet{break-after:page;padding:24mm 13mm 14mm}.sheet:last-child{break-after:auto}.day,.box,.photo-card,.highlights{break-inside:avoid}.day-head,.price-table th,.price-table td,.caption,.highlights{print-color-adjust:exact;-webkit-print-color-adjust:exact}.hero-photo{height:76mm}.photo-card{height:34mm}.day-photo{height:58mm}.cover{min-height:297mm}.footer{display:none}}
  @media(max-width:720px){.cover,.sheet{padding:18px}.title h1{font-size:27px}.subtitle{font-size:15px}.hero-photo{height:230px}.meta,.photo-strip,.cover-grid,.grid2{grid-template-columns:1fr}.topbar{flex-wrap:wrap}.brand{font-size:17px}.day-head{display:block}.meal{display:block;margin-top:3px}}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <span class="brand">WEBUY Tour &amp; Travel</span>
    <span class="langs" id="langSwitch">
      <button data-lang="zh" onclick="switchLang('zh')">中文</button>
      <button data-lang="en" onclick="switchLang('en')">English</button>
      <button data-lang="id" onclick="switchLang('id')">Bahasa Indonesia</button>
    </span>
    <span class="actions">
      <button class="btn pdf" onclick="printCleanPdf()">PDF</button>
      <a id="docLink" class="btn doc" style="display:none" download>Word</a>
    </span>
    <img id="logo" class="logo" alt="WEBUY">
  </div>
  <div id="content" class="empty">Loading...</div>
</div>
<script>
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const firstText=(arr,field)=>{for(const x of arr||[]){const v=field?x&&x[field]:x;if(v)return String(v)}return''};

// ── tri-language: static UI labels (content text comes from the API) ──
const QUOTE_LANGS=['id','zh','en'];
const UI={
  id:{eyebrow:'Customer Itinerary',period:'Periode',duration:'Durasi',hotelStar:'Hotel',durationFmt:n=>n+' Hari '+(n-1)+' Malam',
    coverNote:'Program ini adalah versi pelanggan. Detail penerbangan, hotel, kereta, dan urutan acara dapat menyesuaikan kondisi operasional tanpa mengurangi destinasi utama.',
    hl:'✨ Highlight Perjalanan',hlCap:'Highlight Perjalanan',destCap:'Destinasi Pilihan',notesTitle:'Catatan Penting',
    notes:['Harga final mengikuti tanggal, jumlah peserta, kurs, dan ketersediaan.','Program dapat berubah mengikuti kondisi operasional.'],
    itinerary:'Rencana Perjalanan',meals:'Meals',dest:'Destinasi hari ini:',opt:'Acara Pilihan:',shop:'Kunjungan Toko:',hotel:'Hotel:',
    priceHeading:'Informasi Harga',priceCol0:'DEPARTURE',priceCol1:'HARGA KAMAR TWIN / orang',noted:'Noted :',
    inc:'Harga Termasuk',exc:'Harga Tidak Termasuk',stock:'Ilustrasi (foto stok)',
    demoNote:'Draft ini masih berisi data demo. Silakan generate ulang setelah konfigurasi AI aktif.',
    translating:'Menyiapkan versi bahasa ini…',notAvail:'Versi bahasa ini belum dibuat. Silakan buka dari sistem OPS untuk membuatnya.'},
  zh:{eyebrow:'客户行程单',period:'出发时段',duration:'行程天数',hotelStar:'酒店星级',durationFmt:n=>n+'天'+(n-1)+'晚',
    coverNote:'本行程为客户版本。航班、酒店、火车及活动顺序可能根据实际运营情况调整，不减少主要景点。',
    hl:'✨ 行程亮点',hlCap:'行程亮点',destCap:'精选目的地',notesTitle:'重要提示',
    notes:['最终价格视出发日期、人数、汇率及位控情况而定。','行程顺序可能根据实际运营情况调整。'],
    itinerary:'每日行程',meals:'餐食',dest:'今日景点：',opt:'自费项目：',shop:'购物店：',hotel:'酒店：',
    priceHeading:'价格信息',priceCol0:'出发日期',priceCol1:'双人间价格 / 每人',noted:'注意事项：',
    inc:'费用包含',exc:'费用不包含',stock:'示意图（图库照片）',
    demoNote:'当前为演示数据，请在 AI 配置生效后重新生成。',
    translating:'正在生成中文版本…',notAvail:'该语言版本尚未生成，请在 OPS 系统中打开本页面生成。'},
  en:{eyebrow:'Customer Itinerary',period:'Period',duration:'Duration',hotelStar:'Hotel',durationFmt:n=>n+' Days '+(n-1)+' Nights',
    coverNote:'This is the customer version. Flights, hotels, trains and activity order may adjust to operational conditions without reducing main destinations.',
    hl:'✨ Trip Highlights',hlCap:'Trip Highlights',destCap:'Featured Destinations',notesTitle:'Important Notes',
    notes:['Final price depends on date, group size, exchange rate and availability.','The program may change according to operational conditions.'],
    itinerary:'Daily Itinerary',meals:'Meals',dest:"Today's destinations:",opt:'Optional:',shop:'Shopping stop:',hotel:'Hotel:',
    priceHeading:'Price Information',priceCol0:'DEPARTURE',priceCol1:'TWIN ROOM PRICE / person',noted:'Notes :',
    inc:'Package Includes',exc:'Package Excludes',stock:'Illustration (stock photo)',
    demoNote:'This draft still contains demo data. Please regenerate after the AI configuration is active.',
    translating:'Preparing this language version…',notAvail:'This language version has not been generated yet. Open this page from the OPS system to generate it.'},
};
const normLang=l=>QUOTE_LANGS.includes(l)?l:'id';
// same merge logic as api/_quote-lib.js mergeQuoteLang — translations carry
// text only; images/prices/meal codes always come from the base content
function mergeLang(base,lang){
  const baseLang=normLang(base.lang);lang=normLang(lang);
  if(lang===baseLang)return base;
  const tr=(base.translations||{})[lang];if(!tr)return null;
  const days=(base.days||[]).map((d,i)=>{const td=(tr.days||[])[i]||{};return{...d,
    routeTitle:td.routeTitle||d.routeTitle,intro:td.intro!=null?td.intro:d.intro,
    attractions:(d.attractions||[]).map((a,j)=>{const ta=(td.attractions||[])[j]||{};return{...a,name:ta.name||a.name,desc:ta.desc||a.desc}}),
    optional:(d.optional||[]).map((o,j)=>{const to=(td.optional||[])[j]||{};return{...o,name:to.name||o.name}}),
    shopping:td.shopping!=null?td.shopping:d.shopping,hotel:td.hotel||d.hotel,closing:td.closing!=null?td.closing:d.closing}});
  return{...base,lang,trip:{...(base.trip||{}),...(tr.trip||{})},
    highlights:(tr.highlights&&tr.highlights.length)?tr.highlights:base.highlights,
    departure_label:tr.departure_label||base.departure_label,days,
    termasuk:(tr.termasuk&&tr.termasuk.length)?tr.termasuk:base.termasuk,
    tidak:(tr.tidak&&tr.tidak.length)?tr.tidak:base.tidak,
    noted:(tr.noted&&tr.noted.length)?tr.noted:base.noted};
}
function hotelStarText(q){
  const stars=(q.days||[]).map(d=>{const m=String(d.hotel||'').match(/bintang\s*([3-5])|([3-5])\s*-?\s*star|([3-5])\s*星|([3-5])\s*★/i);return m?Number(m[1]||m[2]||m[3]||m[4]):0}).filter(Boolean);
  if(!stars.length)return'4★';
  const c={};for(const s of stars)c[s]=(c[s]||0)+1;
  return Object.entries(c).sort((a,b)=>b[1]-a[1])[0][0]+'★';
}
// staff token from the same-origin OPS app session (supabase-js localStorage)
function findStaffToken(){
  try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);
    if(/^sb-.*-auth-token$/.test(k)){const v=JSON.parse(localStorage.getItem(k)||'null');
      const t=v&&(v.access_token||(v.currentSession&&v.currentSession.access_token));if(t)return t}}}catch(e){}
  return'';
}
let RAW=null,LANG='id',QID='';
function markActiveLang(){document.querySelectorAll('#langSwitch button').forEach(b=>b.classList.toggle('active',b.dataset.lang===LANG))}
async function switchLang(lang){
  lang=normLang(lang);
  if(!RAW||lang===LANG)return;
  const merged=mergeLang(RAW,lang);
  if(merged){LANG=lang;markActiveLang();render(merged);const u=new URL(location);u.searchParams.set('lang',lang);history.replaceState(null,'',u);return}
  // translation missing — staff (with an OPS session) can generate it on the spot
  const token=findStaffToken();
  if(!token){alert(UI[lang].notAvail);return}
  const btns=document.querySelectorAll('#langSwitch button');btns.forEach(b=>b.disabled=true);
  const content=document.getElementById('content');
  const prev=content.innerHTML;
  content.className='empty';content.textContent=UI[lang].translating;
  try{
    const headers={'Authorization':'Bearer '+token,'Content-Type':'application/json'};
    let r=await fetch('/api/quote-generate',{method:'POST',headers,body:JSON.stringify({id:QID,lang})});
    let j=await r.json().catch(()=>({}));
    if(!r.ok)throw new Error(j.error||('HTTP '+r.status));
    const rr=await fetch('/api/quote-get?id='+encodeURIComponent(QID)+'&t='+Date.now());
    if(rr.ok)RAW=await rr.json();
    const m2=mergeLang(RAW,lang);
    if(!m2)throw new Error('translation not stored');
    LANG=lang;markActiveLang();content.className='';render(m2);
    const u=new URL(location);u.searchParams.set('lang',lang);history.replaceState(null,'',u);
    // produce the Word file for this language in the background
    fetch('/api/quote-render',{method:'POST',headers,body:JSON.stringify({id:QID,lang})})
      .then(x=>x.ok?x.json():null)
      .then(x=>{if(x&&x.docxUrl&&LANG===lang){const a=document.getElementById('docLink');a.href=x.docxUrl;a.style.display='inline-block'}})
      .catch(()=>{});
  }catch(e){content.className='';content.innerHTML=prev;alert((UI[lang].translating.replace('…',''))+' failed: '+e.message)}
  finally{btns.forEach(b=>b.disabled=false)}
}
const CURATED_IMAGES=[
  [/HONGYADONG|HONGYA\s*CAVE|洪崖洞|洪亚洞/i,'/quote-assets/chongqing/hongyadong-night.jpg'],
  [/WANGXIAN/i,'/quote-assets/jiangnan/wangxian-valley.jpg'],
  [/WUKANG|TIANZIFANG|ANFU|CITY GOD/i,'/quote-assets/jiangnan/shanghai-wukang-road.jpg'],
  [/SHANGHAI|LUJIAZUI|ORIENTAL PEARL|BUND|NANJING/i,'/quote-assets/jiangnan/shanghai-bund.jpg'],
  [/BALAGEZONG|BALA|GEZONG|GLASS|PLANK/i,'/quote-assets/yunnan/balagezong.jpg'],
  [/TIGER LEAPING|YANGTZE|DUKEZONG|GUISHAN/i,'/quote-assets/yunnan/tiger-leaping-gorge.jpg'],
  [/JADE DRAGON|BLUE MOON|GLACIER|GANHAIZI|BAISHUI|IMPRESSION LIJIANG/i,'/quote-assets/yunnan/jade-dragon-snow-mountain.jpg'],
  [/SHAXI|SIDENG|YUJIN|THEATRE/i,'/quote-assets/yunnan/shaxi-ancient-town.jpg'],
  [/DALI|ERHAI|XIZHOU|S-BAY|SANTORINI|FOREIGNER/i,'/quote-assets/yunnan/dali-erhai.jpg'],
  [/KUNMING|SHILIN|DIANCHI|STONE FOREST|NANPING|JINMA/i,'/quote-assets/yunnan/kunming-wetland.jpg'],
];
function curatedImageForDay(d){
  if(!(d.attractions&&d.attractions.length)) return '';
  const hay=[d.routeTitle,...(d.attractions||[]).flatMap(a=>[a.name,a.imageQuery])].filter(Boolean).join(' ');
  const hit=CURATED_IMAGES.find(([re])=>re.test(hay));
  return hit?hit[1]:'';
}
function collectDayImages(q,d){
  const imgs=q.images||{},urls=[],seen=new Set();
  const curated=curatedImageForDay(d);
  if(curated){seen.add(curated);urls.push(curated)}
  for(const n of d.imageNames||[]){if(imgs[n]&&!seen.has(imgs[n])){seen.add(imgs[n]);urls.push(imgs[n])}}
  return urls;
}
function allImages(q){const out=[],seen=new Set();for(const d of q.days||[])for(const u of collectDayImages(q,d)){if(!seen.has(u)){seen.add(u);out.push(u)}}return out}
function coverImage(q){
  const preferred=['/quote-assets/chongqing/hongyadong-night.jpg','/quote-assets/jiangnan/wangxian-valley.jpg','/quote-assets/jiangnan/shanghai-bund.jpg','/quote-assets/yunnan/dali-erhai.jpg','/quote-assets/yunnan/jade-dragon-snow-mountain.jpg','/quote-assets/yunnan/balagezong.jpg'];
  const imgs=allImages(q);
  return preferred.find(u=>imgs.includes(u))||imgs[0]||'';
}
function heroLabel(q){return (q.trip&&q.trip.subtitle)||firstText(q.days,'routeTitle')||'Customer Itinerary'}
function printCleanPdf(){
  const shell=document.querySelector('.shell');
  if(!shell){window.print();return}
  const w=window.open('','_blank');
  if(!w){window.print();return}
  const style=document.querySelector('style').textContent;
  w.document.open();
  w.document.write('<!DOCTYPE html><html lang="id"><head><meta charset="utf-8"><base href="'+esc(location.origin)+'/"><title>WEBUY Itinerary PDF</title><style>'+style+'</style></head><body>'+shell.outerHTML+'</body></html>');
  w.document.close();
  const run=()=>{w.focus();w.print();setTimeout(()=>w.close(),800)};
  const imgs=[...w.document.images];
  if(!imgs.length){setTimeout(run,120);return}
  let left=imgs.length;
  const done=()=>{left-=1;if(left<=0)setTimeout(run,120)};
  imgs.forEach(img=>img.complete?done():(img.onload=done,img.onerror=done));
  setTimeout(()=>{if(left>0)run()},2500);
}
function render(q){
  const T=UI[normLang(q.lang||LANG)]||UI.id;
  const year=new Date().getFullYear();
  const footerLine='WeBuy Tour &amp; Travel | www.webuy.travel | '+year;
  if(q.logoUrl){const l=document.getElementById('logo');l.src=q.logoUrl;l.style.display='block'}
  const docUrl=(q.docxUrls&&q.docxUrls[normLang(q.lang||LANG)])||q.docxUrl;
  if(docUrl){const a=document.getElementById('docLink');a.href=docUrl;a.style.display='inline-block'}
  const days=q.days||[],imgs=allImages(q),hero=coverImage(q),strip=imgs.filter(u=>u!==hero).filter(u=>!/kunming-wetland/.test(u)).slice(0,2);
  const hasDemo=/Pesona Demo|Kota A|Kota B/i.test((q.trip&&q.trip.title||'')+' '+(q.trip&&q.trip.subtitle||''));
  const qual=q.quality||{ok:true,issues:[]};
  const gen=q.generator||'';
  let h='<section class="cover"><div>';
  if(hasDemo) h+='<div class="note" style="margin-bottom:12px">'+esc(T.demoNote)+'</div>';
  if(!qual.ok) h+='<div class="note" style="margin-bottom:12px;border-left-color:#C00000;background:#FEF2F2;color:#7F1D1D"><b>⚠ Draft ini perlu review manual.</b> Sistem mendeteksi: '+(qual.issues||[]).map(esc).join('；')+'. Jangan kirim ke customer sebelum diperbaiki.</div>';
  if(gen==='rule-based') h+='<div class="note" style="margin-bottom:12px">Draft dihasilkan oleh rule-based parser (tanpa AI). Review manual diwajibkan sebelum kirim ke customer.</div>';
  h+='<div class="title"><div class="eyebrow">'+esc(T.eyebrow)+'</div><h1>'+esc(q.trip&&q.trip.title||'WEBUY Itinerary')+'</h1><div class="subtitle">'+esc(q.trip&&q.trip.subtitle||'')+'</div></div>';
  if(hero) h+='<div class="hero-photo" style="--photo:url('+esc(hero)+')"><img src="'+esc(hero)+'" alt=""><div class="caption">'+esc(heroLabel(q))+'</div></div>';
  h+='<div class="meta"><div><b>'+esc(T.period)+'</b><span>'+esc(q.departure_label||'-')+'</span></div><div><b>'+esc(T.duration)+'</b><span>'+esc(days.length?T.durationFmt(days.length):'-')+'</span></div><div><b>'+esc(T.hotelStar)+'</b><span>'+esc(hotelStarText(q))+'</span></div></div>';
  h+='<div class="note">'+esc(T.coverNote)+'</div>';
  if(strip.length) h+='<div class="photo-strip">'+strip.map((u,i)=>'<div class="photo-card" style="--photo:url('+esc(u)+')"><img src="'+esc(u)+'" alt=""><div class="caption">'+esc(i===0?T.hlCap:T.destCap)+'</div></div>').join('')+'</div>';
  const notesBox='<div class="box"><h3>'+esc(T.notesTitle)+'</h3><ul>'+T.notes.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul></div>';
  if(q.highlights && q.highlights.length){
    h+='<div class="highlights"><div class="hl-title">'+esc(T.hl)+'</div>'
      +q.highlights.map(x=>'<div class="hl-item">▸ '+esc(x)+'</div>').join('')
      +'</div>';
    h+='<div class="cover-grid">'+notesBox+'</div>';
  } else {
    h+='<div class="cover-grid"><div class="box"><h3>'+esc(T.hlCap)+'</h3><ul>'+days.filter(d=>d.attractions&&d.attractions.length).slice(0,5).map(d=>'<li>'+esc(d.routeTitle)+'</li>').join('')+'</ul></div>'+notesBox+'</div>';
  }
  h+='</div><div class="footer">'+footerLine+'</div></section>';
  h+='<section class="sheet"><h2 class="section-title">'+esc(T.itinerary)+'</h2>';
  for(const d of days){
    const urls=collectDayImages(q,d);
    h+='<div class="day"><div class="day-head"><span>DAY '+esc(d.dayNo)+' : '+esc(d.routeTitle||'')+'</span><span class="meal">'+esc(T.meals)+': '+esc(d.mealCode||'-')+'</span></div><div class="day-body">';
    if(urls[0]){
      const cap=d.imageSource==='pexels'?'<div class="caption">'+esc(T.stock)+'</div>':'';
      h+='<div class="day-photo" style="--photo:url('+esc(urls[0])+')"><img src="'+esc(urls[0])+'" alt="">'+cap+'</div>';
    }
    if(d.intro) h+='<p>'+esc(d.intro)+'</p>';
    if(d.attractions&&d.attractions.length){h+='<div class="dest">'+esc(T.dest)+'</div>';for(const a of d.attractions)h+='<div class="att"><span class="name">'+esc(a.name)+'</span><br><span class="desc">'+esc(a.desc)+'</span></div>'}
    for(const o of d.optional||[])h+='<div class="opt"><b>'+esc(T.opt)+'</b> '+esc(o.name)+' - '+esc(o.price)+'</div>';
    if(d.shopping)h+='<div class="shop"><b>'+esc(T.shop)+'</b> '+esc(d.shopping)+'</div>';
    if(d.closing)h+='<p>'+esc(d.closing)+'</p>';
    if(d.hotel)h+='<div class="hotel">'+esc(T.hotel)+' '+esc(d.hotel)+'</div>';
    h+='</div></div>';
  }
  h+='</section><section class="sheet"><h2 class="section-title">'+esc(T.priceHeading)+'</h2>';
  h+='<table class="price-table"><tr><th>'+esc(T.priceCol0)+'</th><th>'+esc(T.priceCol1)+'</th></tr><tr><td>'+esc(q.departure_label||'')+'</td><td>Rp&nbsp;&nbsp;_______________________</td></tr></table>';
  if(q.noted&&q.noted.length)h+='<div class="noted"><b>'+esc(T.noted)+'</b>'+q.noted.map(x=>'<div>· '+esc(x)+'</div>').join('')+'</div>';
  const box=(t,items)=>items&&items.length?'<div class="box"><h3>'+esc(t)+'</h3><ul>'+items.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul></div>':'';
  h+='<div class="grid2">'+box(T.inc,q.termasuk)+box(T.exc,q.tidak)+'</div><p class="footer">'+footerLine+'</p></section>';
  document.getElementById('content').className='';
  document.getElementById('content').innerHTML=h;
  document.title=(q.trip&&q.trip.title||'WEBUY Itinerary')+' - WEBUY';
}
(async function(){
  const params=new URLSearchParams(location.search);
  const wantLang=params.get('lang');
  if(window.QUOTE_DATA){RAW=window.QUOTE_DATA;LANG=normLang(wantLang||RAW.lang);markActiveLang();render(mergeLang(RAW,LANG)||RAW);return}
  const id=params.get('id');QID=id||'';
  if(!id){document.getElementById('content').textContent='Missing quote id.';return}
  try{
    const r=await fetch('/api/quote-get?id='+encodeURIComponent(id));
    if(!r.ok)throw new Error('HTTP '+r.status);
    RAW=await r.json();
    LANG=normLang(wantLang||RAW.lang);
    const merged=mergeLang(RAW,LANG);
    if(!merged)LANG=normLang(RAW.lang);
    markActiveLang();
    render(merged||RAW);
  }
  catch(e){document.getElementById('content').textContent='Gagal memuat: '+e.message}
})();
</script>
